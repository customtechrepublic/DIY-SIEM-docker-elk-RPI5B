# Syslog forwarder config - forwards all logs to SIEM
# Place this as syslog-forwarder/config/rsyslog.conf

# Load modules
module(load="imudp")
module(load="imtcp")
module(load="immark")
module(load="imrelp")

# Mark message interval (every 30 minutes)
$MarkMessagePeriod 1800

# Listen on port 5140 (non-privileged)
input(type="imudp" port="5140" ruleset="remote")
input(type="imtcp" port="5140" ruleset="remote")

# Ruleset for remote syslog
ruleset(name="remote") {
    # Add receive timestamp
    template(name="RemoteLog" type="string" string="%timegenerated% %hostname% %syslogtag%%msg%\n")

    # Store locally (optional)
    action(type="omfile" file="/var/log/remote/remote.log" template="RemoteLog")

    # Forward to SIEM (Logstash on port 514)
    action(type="omfwd" target="logstash" port="514" protocol="tcp"
           Template="RSYSLOG_SyslogProtocol23Format"
           Queue.FileName="fwdRule1"
           Queue.Type="LinkedList"
           Queue.SaveOnShutdown="on"
           Action.resumeinterval="10"
           Action.retrycount="3")
}

# Handle local messages
$syslogdServerRun 514